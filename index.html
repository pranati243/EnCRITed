<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="EnCRITed – FCRIT Cipher Lab — A classical cryptography learning tool. Encrypt and decrypt with step-by-step explanations." />
    <title>EnCRITed – FCRIT Cipher Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- ===== Header ===== -->
    <header class="app-header">
        <div class="header-inner">
            <div class="brand">
                <div class="logo-icon">
                    <!-- Lock / shield SVG -->
                    <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="34" height="34" rx="8" fill="url(#logo-grad)" />
                        <path d="M11 15V13a6 6 0 0 1 12 0v2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
                        <rect x="9.5" y="15" width="15" height="11" rx="2.5" stroke="#fff" stroke-width="1.8" />
                        <circle cx="17" cy="20.5" r="1.8" fill="#fff" />
                        <line x1="17" y1="22.3" x2="17" y2="24" stroke="#fff" stroke-width="1.8"
                            stroke-linecap="round" />
                        <defs>
                            <linearGradient id="logo-grad" x1="0" y1="0" x2="34" y2="34">
                                <stop stop-color="#0d9488" />
                                <stop offset="1" stop-color="#0ea5e9" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div>
                    <h1>En<span class="highlight">CRIT</span>ed</h1>
                    <p class="tagline">FCRIT Cipher Lab</p>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode" aria-label="Toggle theme">
                <!-- Sun icon (shown in dark mode) -->
                <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
                <!-- Moon icon (shown in light mode) -->
                <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- ===== Main Two-Column Layout ===== -->
    <main class="container">
        <!-- ────── LEFT PANEL: Inputs ────── -->
        <section class="panel panel-input" id="inputPanel">
            <div class="panel-header">
                <!-- Gear SVG icon -->
                <svg class="panel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
                <h2>Configuration &amp; Input</h2>
            </div>

            <!-- Cipher Type -->
            <div class="field-group">
                <label for="cipherType">Cipher Type</label>
                <div class="select-wrap">
                    <select id="cipherType">
                        <option value="">— Select Type —</option>
                        <option value="substitution">Substitution</option>
                        <option value="transposition">Transposition</option>
                    </select>
                </div>
            </div>

            <!-- Algorithm -->
            <div class="field-group">
                <label for="algorithm">Algorithm</label>
                <div class="select-wrap">
                    <select id="algorithm" disabled>
                        <option value="">— Select Algorithm —</option>
                    </select>
                </div>
            </div>

            <!-- Dynamic input fields -->
            <div id="dynamicFields"></div>

            <!-- Remove spaces option -->
            <div class="field-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="removeSpaces" checked />
                    <span class="checkmark"></span>
                    Remove spaces from input
                </label>
            </div>

            <!-- Action Buttons -->
            <div class="btn-group">
                <button class="btn btn-encrypt" id="btnEncrypt" disabled>
                    <svg class="btn-svg lock-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect class="lock-body" x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path class="lock-shackle" d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <span>Encrypt</span>
                </button>
                <button class="btn btn-decrypt" id="btnDecrypt" disabled>
                    <svg class="btn-svg unlock-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect class="lock-body" x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path class="unlock-shackle" d="M7 11V7a5 5 0 0 1 9.9-1" />
                    </svg>
                    <span>Decrypt</span>
                </button>
            </div>

            <!-- Error messages -->
            <div id="errorBox" class="error-box" hidden>
                <svg class="err-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                <span id="errorText"></span>
            </div>
        </section>

        <!-- ────── RIGHT PANEL: Output & Steps ────── -->
        <section class="panel panel-output" id="outputPanel">
            <!-- Final Result -->
            <div class="result-card" id="resultCard" hidden>
                <div class="panel-header">
                    <!-- Check-circle SVG -->
                    <svg class="panel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                    <h2>Final Result</h2>
                </div>
                <div class="result-text" id="resultText"></div>
                <button class="copy-btn" id="copyBtn" title="Copy result">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                    </svg>
                    <span>Copy</span>
                </button>
            </div>

            <!-- Steps -->
            <div class="steps-card" id="stepsCard" hidden>
                <div class="panel-header">
                    <!-- Book-open SVG -->
                    <svg class="panel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                    </svg>
                    <h2>Step-by-Step Explanation</h2>
                </div>
                <div class="steps-scroll" id="stepsContent"></div>
            </div>

            <!-- Placeholder -->
            <div class="placeholder" id="outputPlaceholder">
                <div class="placeholder-inner">
                    <svg class="placeholder-svg" width="56" height="56" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <p>Select a cipher, enter your inputs, and click <strong>Encrypt</strong> or
                        <strong>Decrypt</strong> to see results here.
                    </p>
                </div>
            </div>
        </section>
    </main>

    <!-- ===== Footer ===== -->
    <footer class="app-footer">
        <p>EnCRITed &mdash; FCRIT Cipher Lab &copy; 2026 &mdash; <em>"Every secret has a key."</em></p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
